<!DOCTYPE html>
<html>
<head><title>Загрузка миссии</title></head>
<body>
    <h2>Загрузить файл миссии</h2>
    <form action="/api/missions/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="file" accept=".json,.yaml,.yml,.xml,.txt" required>
        <button type="submit">Отправить</button>
    </form>
</body>
</html>
